name: Verificar saldo OpenRouter

on:
  schedule:
    # roda a cada 5 minutos (mínimo permitido pelo GitHub Actions;
    # em horários de pico o GitHub pode atrasar execuções agendadas)
    - cron: "*/5 * * * *"
  workflow_dispatch: # permite rodar manualmente pelo botão "Run workflow"
    inputs:
      report_balance:
        description: "Enviar o saldo atual no Slack (teste)"
        type: boolean
        default: false

jobs:
  check-balance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verificar saldo e alertar no Slack se necessário
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          THRESHOLD: "0" # só alerta quando o saldo chegar a 0 ou menos
          REPORT_BALANCE: ${{ inputs.report_balance }} # vazio em execuções agendadas
        run: node check-balance.js
